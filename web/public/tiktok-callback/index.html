<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>TikTok OAuth Callback</title>
<style>
body{font-family:system-ui,sans-serif;background:#0f172a;color:#fff;padding:40px;max-width:720px;margin:0 auto;line-height:1.6}
h1{color:#38bdf8}
.code{background:#1e293b;padding:16px;border-radius:8px;font-family:monospace;word-break:break-all;font-size:14px;margin:16px 0;border:1px solid #334155}
.copy{background:#0ea5e9;color:#fff;border:0;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:14px}
.copy:hover{background:#0284c7}
.label{color:#94a3b8;font-size:13px;text-transform:uppercase;letter-spacing:.05em}
</style>
</head>
<body>
<h1>TikTok OAuth Callback</h1>
<p>아래 인증 코드를 복사한 뒤 터미널에서 다음 명령을 실행하세요:</p>
<div class="label">Authorization Code</div>
<div class="code" id="code">로딩 중…</div>
<button class="copy" onclick="copyCode()">코드 복사</button>
<div class="label" style="margin-top:24px">실행 명령</div>
<div class="code" id="cmd">…</div>
<button class="copy" onclick="copyCmd()">명령 복사</button>
<script>
const params=new URLSearchParams(location.search);
const code=params.get("code");
const state=params.get("state");
const err=params.get("error");
if(err){
  document.getElementById("code").textContent="ERROR: "+err+" — "+(params.get("error_description")||"");
}else if(code){
  document.getElementById("code").textContent=code;
  document.getElementById("cmd").textContent=`python3 -c "from dotenv import load_dotenv; load_dotenv('.env'); from auto_publisher.video_uploader import tiktok_auth_setup; tiktok_auth_setup(code='${code}')"`;
}else{
  document.getElementById("code").textContent="(code 파라미터 없음)";
}
function copyCode(){navigator.clipboard.writeText(code||"")}
function copyCmd(){navigator.clipboard.writeText(document.getElementById("cmd").textContent)}
</script>
</body>
</html>
