[related]
  threshold = 60
  includeNewer = true
  toLower = false
  [[related.indices]]
    name = "keywords"
    weight = 100
  [[related.indices]]
    name = "tags"
    weight = 50
  [[related.indices]]
    name = "date"
    weight = 10

[taxonomies]
  category = "categories"
  tag = "tags"

[markup.goldmark.renderer]
  unsafe = true

[services]
  [services.googleAnalytics]
    ID = "G-0PNL94C6J7"

[params.giscus]
  repo = "moonie0201/nichproject"
  repoId = "R_kgDOSGcgEg"
  category = "Announcements"
  categoryId = "DIC_kwDOSGcgEs4C7zyO"
  mapping = "pathname"
  theme = "preferred_color_scheme"
  lang = "ko"
