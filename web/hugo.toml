baseURL = 'https://investiqs.net/'
defaultContentLanguage = 'ko'
defaultContentLanguageInSubdir = true
theme = 'PaperMod'

[sitemap]
  changefreq = "weekly"
  priority = 0.7
  filename = "sitemap.xml"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = false
  googleAdSense = "ca-pub-3459019439429067"
  ai_content_policy = "https://investiqs.net/ko/about/editorial-process/"
  enableRobotsTXT = true
  canonifyURLs = true
  mainSections = ["daily", "weekly", "study", "blog"]

  # 커버 이미지 없는 페이지의 기본 og:image
  images = ["/images/og-default.png"]

  [params.assets]
    disableHLJS = true

  [params.schema]
    publisherName = "InvestIQs"
    publisherLogo = "/images/logo-512.png"
    publisherType = "Organization"
    sameAs = [
      "https://twitter.com/investiqs",
      "https://www.linkedin.com/company/investiqs"
    ]

[languages]
  [languages.ko]
    languageCode = 'ko'
    languageName = '한국어'
    title = 'InvestIQs — 투자 정보 블로그'
    contentDir = 'content/ko'
    weight = 1
    [languages.ko.params]
      description = "ETF, 배당주, 절세 전략 — 데이터 기반 투자 정보를 전달합니다."
    [[languages.ko.menu.main]]
      name = "투자공부"
      identifier = "ko-study"
      url = "/ko/study/"
      weight = 1
    [[languages.ko.menu.main]]
      name = "일일시황"
      identifier = "ko-daily"
      url = "/ko/daily/"
      weight = 2
    [[languages.ko.menu.main]]
      name = "주간시황"
      identifier = "ko-weekly"
      url = "/ko/weekly/"
      weight = 3
    [[languages.ko.menu.footer]]
      name = "개인정보처리방침"
      identifier = "ko-privacy"
      url = "/ko/privacy/"
      weight = 1
    [[languages.ko.menu.footer]]
      name = "문의하기"
      identifier = "ko-contact"
      url = "/ko/contact/"
      weight = 2

  [languages.en]
