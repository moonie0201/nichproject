{{- partial "schema.html" . }}

{{- range .AllTranslations }}
<link rel="alternate" hreflang="{{ .Language.LanguageCode }}" href="{{ .Permalink }}" />
{{- end }}
{{- range .AllTranslations }}{{ if eq .Language.Lang "en" }}<link rel="alternate" hreflang="x-default" href="{{ .Permalink }}" />{{ end }}{{- end }}
{{- if .Params.ai_generated }}
<meta name="ai-generated" content="true" />
<meta name="ai-model" content="{{ .Params.ai_models | default "Claude/Gemini" }}" />
<meta name="human-reviewed" content="automated-only" />
<meta name="ai-content-policy" content="{{ site.Params.ai_content_policy | default "/ko/about/editorial-process/" }}" />
{{- end }}
